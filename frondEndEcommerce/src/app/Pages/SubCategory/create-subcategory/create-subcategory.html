<app-side-bar></app-side-bar>
<div class="container w-100 col-10 justify-content-center pt-5 pb-5">
  
  <a class="btn btn-primary justify-content-center align-items-center mb-4" href="subcategory-list" role="button"><img src="/icons/return-svgrepo-com.svg" alt="" width ="30px" height="30px"> Retour à la liste</a>

  <div class="card mb-3 justify-content-center">
    <div class="row g-0">
      <div class="col-md-4 align-items-center">
        <img src="/image/afficheProd.jpg" class="img-fluid rounded-start" alt="sous-catégorie" style="height: 100%">
      </div>
      <div class="col-md-8">
        <div class="card-body bg-info-subtle">
          <h5 class="card-title">Ajouter une sous-catégorie</h5>
          <div class="card-text">
            <div class="container col-12 pt-4">
              <form [formGroup]="form" (ngSubmit)="createSubcategory()">
                <div class="form-group">
                    <div class="mb-3">
                        <label for="name" class="form-label">Nom :</label>
                        <input type="text" class="form-control" formControlName="name" placeholder="Entrez le nom de la sous-catégorie">
                    </div>
                    <div class="mb-3">
                        <label for="description" class="form-label">Description :</label>
                        <input type="text" class="form-control" formControlName="description" placeholder="Entrez la description de la sous-catégorie">
                    </div>
                    <div class="mb-3">
                        <label for="category" class="form-label">Catégorie :</label>
                        <select class="form-control" formControlName="category">
                          <option [ngValue]="null">Sélectionner une catégorie</option>
                          @for (category of categories; track category.id) {
                            <option [ngValue]="category.id">{{category.name}}</option>
                          }
                        </select>
                    </div>
                    <div class="mb-3 w-100 d-flex justify-content-center">
                      <button type="submit" class="btn btn-primary btn-lg mt-3 mb-2 col-8">Ajouter une sous-catégorie</button>
                    </div>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

</div>
