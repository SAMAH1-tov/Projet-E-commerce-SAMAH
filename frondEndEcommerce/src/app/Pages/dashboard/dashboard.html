<div class="d-flex flex-row w-100" style="height: 100vh">
  <app-nav-bar class="col col-3"></app-nav-bar>
  <div class="col col-9">
    <app-side-bar></app-side-bar>
    <div class="p-3">
      <h2 class="mb-4">Tableau de Bord E-commerce</h2>
      
      <!-- Stats Cards -->
      <div class="row mb-4">
        <div class="col-md-3 mb-3">
          <div class="card text-white bg-primary">
            <div class="card-body">
              <h5 class="card-title">Total Clients</h5>
              <h3 class="card-text">{{ totalClients }}</h3>
              <small>Nombre total de clients</small>
            </div>
          </div>
        </div>
        <div class="col-md-3 mb-3">
          <div class="card text-white bg-success">
            <div class="card-body">
              <h5 class="card-title">Commandes Terminées</h5>
              <h3 class="card-text">{{ completedOrders }}</h3>
              <small>Livrées avec succès</small>
            </div>
          </div>
        </div>
        <div class="col-md-3 mb-3">
          <div class="card text-white bg-warning">
            <div class="card-body">
              <h5 class="card-title">Commandes en Cours</h5>
              <h3 class="card-text">{{ pendingOrders }}</h3>
              <small>En traitement</small>
            </div>
          </div>
        </div>
        <div class="col-md-3 mb-3">
          <div class="card text-white bg-danger">
            <div class="card-body">
              <h5 class="card-title">Commandes Annulées</h5>
              <h3 class="card-text">{{ cancelledOrders }}</h3>
              <small>Annulées/rejetées</small>
            </div>
          </div>
        </div>
      </div>

      <!-- Charts Row 2 -->
      <div class="row mb-4">
        <div class="col-md-6 mb-3">
          <div class="card">
            <div class="card-body">
              <canvas baseChart [data]="barChartData" [options]="barChartOptions" [type]="barChartType" style="height: 300px;"></canvas>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
