<div class="sticky-top w-100">
    <nav class="navbar bg-success mb-3">
        <div class="w-100 d-flex justify-content-end px-2 col-12" style="min-height: 50px;max-height: 60px;">
            <div class="d-flex col col-5 align-items-center rounded-3 border border-white border-1 px-3 py-1 bg-dark">
                <!-- Utilisateur connecté -->
                <div *ngIf="isLoggedIn()" class="d-flex align-items-center w-100">
                    <div class="col col-4 rounded-circle bg-secondary d-flex align-items-center justify-content-center text-white fw-bold" 
                         style="height: 40px; width: 40px; font-size: 14px;">
                        {{ getInitials() }}
                    </div>
                    <div class="col col-8 ms-2">
                        <!-- Username en haut -->
                        <div class="fs-6 text-white fw-bold">
                            {{ returnName() }}
                        </div>
                        <!-- Email en dessous -->
                        <div class="fs-7 text-secondary">
                            {{ getUserEmail() }}
                        </div>
                        <!-- Informations supplémentaires -->
                        <div class="fs-8 text-warning mt-1" *ngIf="isAdmin()">
                            <i class="fas fa-crown me-1"></i>Admin
                        </div>
                    </div>
                </div>  
                <!-- Utilisateur non connecté -->
                <div *ngIf="!isLoggedIn()" class="d-flex align-items-center w-100">
                    <img src="/icons/user-svgrepo-com.svg" class="col col-4 rounded-circle" alt="Default Avatar">
                    <div class="col col-8">
                        <div class="fs-4 text-white">Invité</div>
                        <div class="fs-6 text-white">Non connecté</div>
                    </div>
                </div>
            </div>
            <!-- Bouton de déconnexion en dehors de la navbar -->
            <div *ngIf="isLoggedIn()" class="col col-1 d-flex justify-content-end px-2 mx-3">
                <button class="btn btn-sm btn-danger" (click)="logout()">
                    <img src="/icons/exit-svgrepo-com.svg" alt="" style="width: 20px; height: 20px;">
                </button>
            </div>
        </div>
    </nav>
    
</div>
